<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Important Messages - FF Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
            min-height: 100vh; 
            padding-bottom: 20px;
            color: #ffffff;
        }

        /* Header */
        .header-wrapper { position: relative; }
        .header { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            padding: 20px; 
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .header-title { 
            font-size: 26px; 
            font-weight: 700;
            color: white;
            margin-bottom: 10px;
        }
        
        .header-line { 
            height: 3px; 
            background: rgba(255,255,255,0.5);
            border-radius: 2px;
        }
        
        .back-btn { 
            position: absolute; 
            left: 20px; 
            top: 50%; 
            transform: translateY(-50%);
            font-size: 24px; 
            cursor: pointer; 
            color: white;
            background: rgba(255,255,255,0.2);
            border: none;
            width: 40px;
            height: 40px;            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-50%) scale(1.1);
        }

        /* Messages Container */
        .messages-container { 
            padding: 20px; 
            max-width: 800px;
            margin: 0 auto;
        }

        /* Message Card */
        .message-card { 
            background: linear-gradient(135deg, #2d2d44 0%, #1a1a2e 100%); 
            border-radius: 15px; 
            padding: 20px; 
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            border-left: 4px solid #f44336;
            position: relative;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Important Badge */
        .important-badge { 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%); 
            color: white; 
            padding: 5px 12px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: 700;
            box-shadow: 0 2px 10px rgba(244,67,54,0.4);
        }
        /* Message Content */
        .message-text { 
            color: #e0e0e0; 
            font-size: 16px; 
            line-height: 1.7; 
            margin-bottom: 15px;
        }

        /* Photos Grid */
        .photos-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); 
            gap: 10px; 
            margin: 15px 0;
        }
        
        .photo-thumbnail { 
            width: 100%; 
            height: 100px; 
            object-fit: cover; 
            border-radius: 8px; 
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid #f44336;
        }
        
        .photo-thumbnail:hover { 
            transform: scale(1.05); 
            box-shadow: 0 5px 15px rgba(244,67,54,0.4);
        }

        /* Message Footer */
        .message-footer { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #3d3d5c;
        }

        .message-time { 
            color: #999; 
            font-size: 13px;
        }

        .delete-btn { 
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%); 
            color: white; 
            border: none;             padding: 10px 25px; 
            border-radius: 20px; 
            font-size: 14px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s;
            box-shadow: 0 3px 10px rgba(244,67,54,0.3);
        }
        
        .delete-btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(244,67,54,0.5);
        }

        /* Empty State */
        .empty-state { 
            text-align: center; 
            padding: 60px 20px; 
            color: #666;
        }
        
        .empty-icon { 
            font-size: 80px; 
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .empty-text { 
            font-size: 18px; 
            color: #999;
        }

        /* Zoom Modal */
        .zoom-modal { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.95); 
            display: none; 
            align-items: center; 
            justify-content: center; 
            z-index: 4000;
            cursor: zoom-out;
        }
        
        .zoom-modal.show { 
            display: flex; 
        }        
        .zoom-image { 
            max-width: 95%; 
            max-height: 95%; 
            object-fit: contain;
            border-radius: 10px;
        }
        
        .zoom-close { 
            position: absolute; 
            top: 20px; 
            right: 30px; 
            font-size: 40px; 
            color: white; 
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header-wrapper">
        <div class="header">
            <button class="back-btn" onclick="window.history.back()">←</button>
            <div class="header-title">Important Messages</div>
            <div class="header-line"></div>
        </div>
    </div>

    <!-- Messages Container -->
    <div class="messages-container" id="messagesContainer">
        <!-- Messages will be loaded here -->
    </div>

    <!-- Zoom Modal -->
    <div class="zoom-modal" id="zoomModal" onclick="closeZoom()">
        <span class="zoom-close">&times;</span>
        <img src="" alt="Zoomed photo" class="zoom-image" id="zoomImage">
    </div>

    <script>
        // Load messages on page load
        window.addEventListener('load', loadMessages);
        // Load all messages
        function loadMessages() {
            const container = document.getElementById('messagesContainer');
            const messages = JSON.parse(localStorage.getItem('importantMessages') || '[]');

            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <div class="empty-text">No important messages yet</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            messages.forEach((msg, index) => {
                const messageCard = createMessageCard(msg, index);
                container.appendChild(messageCard);
            });
        }

        // Create message card
        function createMessageCard(msg, index) {
            const card = document.createElement('div');
            card.className = 'message-card';
            
            // Format date
            const date = new Date(msg.timestamp);
            const formattedDate = date.toLocaleString('en-IN', {
                day: '2-digit',
                month: 'short',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });

            // Photos HTML
            let photosHTML = '';
            if (msg.photos && msg.photos.length > 0) {
                photosHTML = '<div class="photos-grid">';
                msg.photos.forEach(photo => {
                    photosHTML += `<img src="${photo}" class="photo-thumbnail" onclick="openZoom('${photo}')" alt="Message photo">`;
                });
                photosHTML += '</div>';
            }

            card.innerHTML = `
                <span class="important-badge">⚠️ Important</span>
                <div class="message-text">${escapeHtml(msg.text)}</div>                ${photosHTML}
                <div class="message-footer">
                    <span class="message-time">🕐 ${formattedDate}</span>
                    <button class="delete-btn" onclick="deleteMessage(${msg.id})">🗑️ Delete</button>
                </div>
            `;

            return card;
        }

        // Open Zoom Modal
        function openZoom(photoSrc) {
            document.getElementById('zoomImage').src = photoSrc;
            document.getElementById('zoomModal').classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        // Close Zoom Modal
        function closeZoom() {
            document.getElementById('zoomModal').classList.remove('show');
            document.body.style.overflow = 'auto';
        }

        // Delete message
        function deleteMessage(id) {
            if (confirm('Are you sure you want to delete this important message?')) {
                let messages = JSON.parse(localStorage.getItem('importantMessages') || '[]');
                messages = messages.filter(msg => msg.id !== id);
                localStorage.setItem('importantMessages', JSON.stringify(messages));
                loadMessages();
            }
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
