<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF Player - Profile Setup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 {
            color: white;
            font-size: 22px;
            font-weight: 600;
        }

        .save-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0.5;
            pointer-events: none;
        }

        .save-btn.active {
            opacity: 1;
            pointer-events: all;
        }

        .save-btn.active:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }

        .save-btn.saving {
            background: #FF9800;
            pointer-events: none;
        }

        /* Profile Photo Section */
        .profile-section {
            padding: 30px 20px;
            text-align: center;
            background: #f8f9fa;
        }

        .photo-container {
            position: relative;
            display: inline-block;
            cursor: pointer;
        }

        .profile-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid white;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            background: #ddd;
        }

        .edit-icon {
            position: absolute;
            bottom: 5px;            right: 5px;
            background: #667eea;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .edit-icon:hover {
            transform: scale(1.1);
            background: #764ba2;
        }

        .edit-icon svg {
            width: 20px;
            height: 20px;
        }

        .photo-hint {
            margin-top: 15px;
            color: #666;
            font-size: 14px;
        }

        /* Form Section */
        .form-section {
            padding: 30px 20px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group label .required {
            color: #f44336;
        }
        .form-group label .optional {
            color: #999;
            font-weight: 400;
            font-size: 12px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-group input.error,
        .form-group textarea.error {
            border-color: #f44336;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .char-count {
            text-align: right;
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .error-message {
            color: #f44336;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {            display: block;
        }

        /* Success Message */
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .success-overlay.show {
            display: flex;
        }

        .success-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: #4CAF50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;            font-size: 40px;
        }

        .success-box h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .success-box p {
            color: #666;
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .header h2 {
                font-size: 18px;
            }
            
            .profile-photo {
                width: 100px;
                height: 100px;
            }
            
            .form-section {
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">            <h2>Complete Profile</h2>
            <button class="save-btn" id="saveBtn">Save</button>
        </div>

        <!-- Profile Photo Section -->
        <div class="profile-section">
            <div class="photo-container" id="photoContainer">
                <img src="https://via.placeholder.com/120" alt="Profile" class="profile-photo" id="profilePhoto">
                <div class="edit-icon">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path>
                    </svg>
                </div>
            </div>
            <p class="photo-hint">Tap to upload photo (Optional)</p>
            <input type="file" id="photoInput" accept="image/*" style="display: none;">
        </div>

        <!-- Form Section -->
        <div class="form-section">
            <!-- Name -->
            <div class="form-group">
                <label>Name <span class="required">*</span></label>
                <input type="text" id="name" placeholder="Enter your full name" maxlength="50">
                <div class="error-message" id="nameError">Please enter your name</div>
            </div>

            <!-- Nickname -->
            <div class="form-group">
                <label>Nickname <span class="required">*</span></label>
                <input type="text" id="nickname" placeholder="Enter your nickname" maxlength="30">
                <div class="error-message" id="nicknameError">Please enter your nickname</div>
            </div>

            <!-- Free Fire UID -->
            <div class="form-group">
                <label>Free Fire UID <span class="required">*</span></label>
                <input type="tel" id="ffuid" placeholder="Enter 10 digit UID" maxlength="10">
                <div class="error-message" id="ffuidError">Please enter valid 10 digit UID (numbers only)</div>
            </div>

            <!-- Bio -->
            <div class="form-group">
                <label>Bio <span class="optional">(Optional)</span></label>
                <textarea id="bio" placeholder="Tell us about yourself..." maxlength="200"></textarea>
                <div class="char-count"><span id="bioCount">0</span>/200</div>
            </div>

            <!-- Link -->
            <div class="form-group">                <label>Link <span class="optional">(Optional)</span></label>
                <input type="url" id="link" placeholder="YouTube/Instagram link">
                <div class="error-message" id="linkError">Please enter a valid URL</div>
            </div>
        </div>
    </div>

    <!-- Success Overlay -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-box">
            <div class="success-icon">✓</div>
            <h3>Profile Saved!</h3>
            <p>Redirecting...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, get, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyC1tXvanDZ-NsMksSgYemHbXALeckncA3M",
            authDomain: "ff-player-99533.firebaseapp.com",
            databaseURL: "https://ff-player-99533-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ff-player-99533",
            storageBucket: "ff-player-99533.firebasestorage.app",
            messagingSenderId: "204761167233",
            appId: "1:204761167233:web:bd33032ce7d56b4e7fe480"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const storage = getStorage(app);

        // DOM Elements
        const saveBtn = document.getElementById('saveBtn');
        const photoContainer = document.getElementById('photoContainer');
        const photoInput = document.getElementById('photoInput');
        const profilePhoto = document.getElementById('profilePhoto');
        const nameInput = document.getElementById('name');
        const nicknameInput = document.getElementById('nickname');
        const ffuidInput = document.getElementById('ffuid');
        const bioInput = document.getElementById('bio');
        const linkInput = document.getElementById('link');
        const successOverlay = document.getElementById('successOverlay');        const bioCount = document.getElementById('bioCount');

        let selectedPhoto = null;
        let currentUser = null;

        // Check if user is logged in and profile exists
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                // Check if profile already exists
                const profileSnap = await get(ref(db, 'profiles/' + user.uid));
                if (profileSnap.exists()) {
                    // Profile exists, redirect to main.html
                    window.location.href = 'main.html';
                } else {
                    // Load existing data if any (from previous attempt)
                    loadDraftData();
                }
            } else {
                // Not logged in, redirect to login
                window.location.href = 'index.html';
            }
        });

        // Photo Upload
        photoContainer.addEventListener('click', () => {
            photoInput.click();
        });

        photoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    alert('Photo size should be less than 5MB');
                    return;
                }
                const reader = new FileReader();
                reader.onload = (e) => {
                    profilePhoto.src = e.target.result;
                    selectedPhoto = file;
                };
                reader.readAsDataURL(file);
            }
        });

        // FF UID - Numbers only
        ffuidInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
            validateForm();
        });
        // Bio character count
        bioInput.addEventListener('input', (e) => {
            bioCount.textContent = e.target.value.length;
        });

        // Real-time validation
        [nameInput, nicknameInput, ffuidInput, linkInput].forEach(input => {
            input.addEventListener('input', validateForm);
            input.addEventListener('blur', () => validateField(input));
        });

        // Validate individual field
        function validateField(field) {
            const errorDiv = document.getElementById(field.id + 'Error');
            let isValid = true;

            if (field.id === 'name' && field.value.trim().length === 0) {
                isValid = false;
            } else if (field.id === 'nickname' && field.value.trim().length === 0) {
                isValid = false;
            } else if (field.id === 'ffuid' && field.value.trim().length !== 10) {
                isValid = false;
            } else if (field.id === 'link' && field.value.trim() !== '') {
                // Validate URL
                try {
                    new URL(field.value);
                } catch {
                    isValid = false;
                }
            }

            if (!isValid && field.value.trim() !== '') {
                field.classList.add('error');
                if (errorDiv) errorDiv.classList.add('show');
            } else {
                field.classList.remove('error');
                if (errorDiv) errorDiv.classList.remove('show');
            }

            return isValid;
        }

        // Validate entire form
        function validateForm() {
            const isNameValid = nameInput.value.trim().length > 0;
            const isNicknameValid = nicknameInput.value.trim().length > 0;
            const isFFUIDValid = ffuidInput.value.trim().length === 10;

            if (isNameValid && isNicknameValid && isFFUIDValid) {                saveBtn.classList.add('active');
            } else {
                saveBtn.classList.remove('active');
            }
        }

        // Load draft data from localStorage
        function loadDraftData() {
            const draft = JSON.parse(localStorage.getItem('profileDraft_' + currentUser.uid));
            if (draft) {
                nameInput.value = draft.name || '';
                nicknameInput.value = draft.nickname || '';
                ffuidInput.value = draft.ffuid || '';
                bioInput.value = draft.bio || '';
                linkInput.value = draft.link || '';
                if (draft.photoURL) {
                    profilePhoto.src = draft.photoURL;
                }
                validateForm();
            }
        }

        // Save draft to localStorage
        function saveDraft() {
            const draft = {
                name: nameInput.value,
                nickname: nicknameInput.value,
                ffuid: ffuidInput.value,
                bio: bioInput.value,
                link: linkInput.value,
                photoURL: profilePhoto.src
            };
            localStorage.setItem('profileDraft_' + currentUser.uid, JSON.stringify(draft));
        }

        // Save button click
        saveBtn.addEventListener('click', async () => {
            if (!saveBtn.classList.contains('active')) return;

            // Validate all fields
            const isNameValid = validateField(nameInput);
            const isNicknameValid = validateField(nicknameInput);
            const isFFUIDValid = validateField(ffuidInput);
            const isLinkValid = linkInput.value.trim() === '' || validateField(linkInput);

            if (!isNameValid || !isNicknameValid || !isFFUIDValid || !isLinkValid) {
                alert('Please fill all required fields correctly');
                return;
            }
            // Show saving state
            saveBtn.classList.add('saving');
            saveBtn.innerHTML = '<span class="spinner"></span>Saving...';

            try {
                let photoURL = null;

                // Upload photo if selected
                if (selectedPhoto) {
                    const photoRef = storageRef(storage, 'profile_photos/' + currentUser.uid + '_' + Date.now());
                    await uploadBytes(photoRef, selectedPhoto);
                    photoURL = await getDownloadURL(photoRef);
                } else if (profilePhoto.src && !profilePhoto.src.includes('placeholder')) {
                    photoURL = profilePhoto.src;
                }

                // Save to Firebase Database
                const profileData = {
                    uid: currentUser.uid,
                    name: nameInput.value.trim(),
                    nickname: nicknameInput.value.trim(),
                    ffuid: ffuidInput.value.trim(),
                    bio: bioInput.value.trim(),
                    link: linkInput.value.trim(),
                    photoURL: photoURL,
                    email: currentUser.email,
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp()
                };

                await set(ref(db, 'profiles/' + currentUser.uid), profileData);

                // Clear draft
                localStorage.removeItem('profileDraft_' + currentUser.uid);

                // Show success
                successOverlay.classList.add('show');
                
                // Redirect to main.html after 1.5 seconds
                setTimeout(() => {
                    window.location.href = 'mainn.html';
                }, 1500);

            } catch (error) {
                console.error('Error saving profile:', error);
                alert('Error saving profile. Please try again.');
                saveBtn.classList.remove('saving');
                saveBtn.innerHTML = 'Save';
            }
        });
        // Auto-save draft every 10 seconds
        setInterval(saveDraft, 10000);

        // Save draft before leaving page
        window.addEventListener('beforeunload', saveDraft);
    </script>
</body>
</html>
