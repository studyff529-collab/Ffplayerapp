<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Success | FF Companion</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ffaa00; --bg: #0f172a; --card: #1e293b; --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; }
        .success-box { background: var(--card); padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid #334155; box-shadow: 0 10px 40px rgba(0,0,0,0.5); animation: zoomIn 0.5s ease; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        .icon-circle { width: 80px; height: 80px; background: rgba(81, 207, 102, 0.1); border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 20px; }
        .icon-circle i { font-size: 40px; color: #51cf66; }
        h2 { font-size: 24px; margin-bottom: 10px; color: #fff; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 30px; }
        .user-email { background: #0f172a; padding: 10px; border-radius: 8px; font-size: 13px; color: var(--primary); margin-bottom: 30px; word-break: break-all; }
        .btn-enter { width: 100%; padding: 14px; background: linear-gradient(135deg, #ffaa00, #ff8800); border: none; border-radius: 10px; color: #000; font-weight: 700; font-size: 16px; cursor: pointer; text-decoration: none; display: block; transition: 0.3s; }
        .btn-enter:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255,170,0,0.4); }
        .logout { margin-top: 15px; font-size: 12px; color: #ff6b6b; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div class="success-box" id="content" style="display:none;">
    <div class="icon-circle">
        <i class="fas fa-check"></i>
    </div>
    <h2>Congratulations!</h2>
    <p>Login Successful. Welcome back.</p>
    
    <div class="user-email" id="userEmailDisplay">loading...</div>
    
    <a href="#" class="btn-enter">ENTER APP</a>
    <div class="logout" id="logoutBtn">Logout</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // 🔥🔥🔥 SAME FIREBASE CONFIG YAHA BHI PASTE KAR 🔥🔥🔥
    const firebaseConfig = {
        apiKey: "AIzaSyD-XXXXXXXXXXXXXXXXXXXXXXXXX",
        authDomain: "your-project.firebaseapp.com",
        projectId: "your-project",
        storageBucket: "your-project.appspot.com",
        messagingSenderId: "123456789",
        appId: "1:123456789:web:abcdef123456"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Security Check: Agar login nahi hai to wapis bhej do
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('content').style.display = 'block';
            document.getElementById('userEmailDisplay').textContent = user.email;
        } else {
            window.location.href = "index.html";
        }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
        signOut(auth).then(() => {
            window.location.href = "index.html";
        });
    });
</script>

</body>
</html>
