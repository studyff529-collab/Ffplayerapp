<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-sport Profile - FF Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0f0f1a; color: white; padding-bottom: 80px; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #1a1a2e; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; }
        .back-btn { background: transparent; border: none; color: white; font-size: 20px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .back-btn:hover { background: rgba(255,255,255,0.1); }
        .header h1 { font-size: 18px; font-weight: 600; }
        .edit-btn { background: transparent; border: 1px solid #667eea; color: #667eea; padding: 6px 15px; border-radius: 20px; font-size: 14px; cursor: pointer; transition: 0.3s; }
        .edit-btn:hover { background: #667eea; color: white; }

        /* Profile Section */
        .profile-section { padding: 30px 20px; text-align: center; }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; background: #2a2a4a; border: 3px solid #667eea; margin: 0 auto 15px; display: flex; justify-content: center; align-items: center; overflow: hidden; box-shadow: 0 0 20px rgba(102, 126, 234, 0.4); }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-avatar .default-icon { font-size: 40px; color: #667eea; }
        .esport-name { font-size: 22px; font-weight: bold; margin-bottom: 5px; color: #fff; }
        .nickname { font-size: 14px; color: #888; margin-bottom: 20px; }

        /* Stats - UPDATED */
        .stats-row { display: flex; justify-content: center; gap: 50px; margin-bottom: 25px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 20px; font-weight: bold; color: #fff; }
        .stat-label { font-size: 12px; color: #666; margin-top: 5px; }

        /* Bio & Link */
        .bio-text { font-size: 14px; color: #888; margin-bottom: 15px; line-height: 1.5; max-width: 400px; margin-left: auto; margin-right: auto; }
        .profile-link { color: #667eea; text-decoration: none; font-size: 14px; margin-bottom: 25px; display: block; }
        .profile-link:hover { text-decoration: underline; }

        /* Action Buttons */
        .action-buttons { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .btn-action { padding: 12px 25px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-share { background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-copy { background: #2a2a4a; color: white; border: 1px solid #3a3a5a; }
        .btn-action:hover { transform: translateY(-2px); }

        /* 🔥 UPDATED: Wider Become Fan / Unfan Button */
        .btn-become-fan {
            background: linear-gradient(90deg, #fbbf24 0%, #f59e0b 100%);
            color: #1a1a2e;
            font-weight: bold;            box-shadow: 0 0 15px rgba(251, 191, 36, 0.4);
            min-width: 180px;
            justify-content: center;
            padding: 14px 30px;
        }
        .btn-become-fan:hover {
            box-shadow: 0 0 25px rgba(251, 191, 36, 0.7);
        }
        .btn-unfan {
            background: #2a2a4a;
            color: #fbbf24;
            border: 2px solid #fbbf24;
            font-weight: bold;
            min-width: 180px;
            justify-content: center;
            padding: 14px 30px;
        }
        .btn-unfan:hover {
            background: #3a3a5a;
        }
        .btn-action:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Mobile Responsive - Wider buttons on mobile */
        @media (max-width: 480px) {
            .action-buttons {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }
            .btn-action {
                width: 100%;
                justify-content: center;
            }
            .btn-become-fan,
            .btn-unfan {
                width: 100%;
                min-width: unset;
                padding: 16px 30px;
            }
        }

        /* Tournament Section */
        .tournament-section { background: #1a1a2e; border-radius: 20px 20px 0 0; padding: 20px; min-height: 300px; margin-top: 20px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-header h2 { font-size: 18px; font-weight: 600; }
        .add-tournament-btn { width: 35px; height: 35px; background: #667eea; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; color: white; }        .empty-state { text-align: center; padding: 40px 20px; color: #666; }
        .empty-state i { font-size: 50px; margin-bottom: 15px; color: #fbbc05; }
        .empty-state p { font-size: 14px; }
        .empty-state span { font-size: 12px; margin-top: 5px; display: block; }

        /* Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #16213e; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: #888; font-size: 22px; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: #667eea; }
        .nav-item:hover { color: #fff; }
        .loading-text { color: #666; font-size: 14px; }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
        <h1>Profile</h1>
        <button class="edit-btn" onclick="editProfile()" id="editBtn" style="display: none;">edit</button>
    </div>

    <!-- Profile Section -->
    <div class="profile-section">
        <!-- Avatar -->
        <div class="profile-avatar">
            <span class="default-icon" id="defaultIcon">🎮</span>
            <img id="profileImage" src="" alt="Profile" style="display: none;">
        </div>

        <!-- Name & Nickname -->
        <h2 class="esport-name" id="esportName">Loading...</h2>
        <p class="nickname" id="nickname">Loading...</p>

        <!-- Stats - Only Live & Fans -->
        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-value" id="liveCount">0</div>
                <div class="stat-label">Live</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="fansCount">0</div>
                <div class="stat-label">Fans</div>
            </div>
        </div>

        <!-- Bio & Link -->
        <p class="bio-text" id="bioText">Loading...</p>
        <a href="#" class="profile-link" id="profileLink" target="_blank" style="display: none;">Loading...</a>
        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="btn-action btn-share" onclick="shareProfile()">
                <i class="fas fa-share-alt"></i> Share
            </button>
            <button class="btn-action btn-copy" onclick="copyLink()">
                <i class="fas fa-link"></i> Copy Link
            </button>
            <!-- 🔥 Become Fan / Unfan Button -->
            <button class="btn-action" id="fanButton" style="display: none;" onclick="toggleFan()">
                <i class="fas fa-heart"></i> <span id="fanButtonText">Become Fan</span>
            </button>
        </div>
    </div>

    <!-- Tournament Section -->
    <div class="tournament-section">
        <div class="section-header">
            <h2>Tournament</h2>
            <div class="add-tournament-btn" onclick="addTournament()"><i class="fas fa-plus"></i></div>
        </div>
        <div class="empty-state">
            <i class="fas fa-trophy"></i>
            <p>No tournaments yet</p>
            <span>Click + to create one</span>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item" onclick="navigate('home.html')"><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="navigate('search.html')"><i class="fas fa-search"></i></div>
        <div class="nav-item" onclick="navigate('battle.html')"><i class="fas fa-crosshairs"></i></div>
        <div class="nav-item" onclick="navigate('tournament.html')"><i class="fas fa-scroll"></i></div>
        <div class="nav-item active" onclick="navigate('profile.html')"><i class="fas fa-user"></i></div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyC1tXvanDZ-NsMksSgYemHbXALeckncA3M",
            authDomain: "ff-player-99533.firebaseapp.com",
            databaseURL: "https://ff-player-99533-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ff-player-99533",
            storageBucket: "ff-player-99533.firebasestorage.app",            messagingSenderId: "204761167233",
            appId: "1:204761167233:web:bd33032ce7d56b4e7fe480"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        console.log("✅ Firebase Initialized for Profile Page");

        // Global Variables
        const urlParams = new URLSearchParams(window.location.search);
        const urlUserId = urlParams.get('uid');
        let targetUserId = null;
        let isOwnProfile = false;
        let currentUser = null;
        let isAlreadyFan = false;

        // 🔥 FORMAT NUMBER (Instagram/YouTube Style)
        function formatNumber(num) {
            if (num >= 1000000) {
                // Millions: 1000000 → 1m, 1500000 → 1.5m
                return (num / 1000000).toFixed(num % 1000000 === 0 ? 0 : 1) + 'm';
            } else if (num >= 1000) {
                // Thousands: 1000 → 1k, 1010 → 1.01k, 101356 → 101.3k
                const formatted = (num / 1000);
                if (num % 1000 === 0) {
                    return formatted.toFixed(0) + 'k';
                } else if (num < 10000) {
                    // 1000-9999: Show 2 decimal places (1.01k, 5.67k)
                    return formatted.toFixed(2) + 'k';
                } else {
                    // 10000+: Show 1 decimal place (10.5k, 101.3k)
                    return formatted.toFixed(1) + 'k';
                }
            } else {
                // Less than 1000: Show as is
                return num.toString();
            }
        }

        // Auth State Check
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                console.log("✅ User logged in:", user.uid);
                
                if (urlUserId) {
                    targetUserId = urlUserId;
                    isOwnProfile = (user.uid === urlUserId);                } else {
                    targetUserId = user.uid;
                    isOwnProfile = true;
                }
                
                console.log("🎯 Loading profile for:", targetUserId, "Is Own:", isOwnProfile);
                loadProfile(targetUserId);
                
                // Show/hide Edit button
                document.getElementById('editBtn').style.display = isOwnProfile ? 'block' : 'none';
                
            } else {
                console.log("❌ No user logged in");
                alert("Please login first!");
                window.location.href = "login.html";
            }
        });

        // Load Profile Data
        function loadProfile(userId) {
            const profileRef = database.ref('users/' + userId + '/profile');
            
            profileRef.once('value')
                .then((snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        console.log("✅ Profile data loaded:", data);
                        
                        // Update UI
                        document.getElementById('esportName').textContent = data.eSportName || "Unknown";
                        document.getElementById('nickname').textContent = data.nickname || "";
                        document.getElementById('bioText').textContent = data.bio || "";
                        
                        // Stats - Formatted Numbers
                        const liveCount = data.posts || 0;
                        const fansCount = data.followers || 0;
                        
                        document.getElementById('liveCount').textContent = formatNumber(liveCount);
                        document.getElementById('fansCount').textContent = formatNumber(fansCount);

                        // Link
                        const linkElem = document.getElementById('profileLink');
                        if (data.addLink && data.addLink !== "") {
                            linkElem.href = data.addLink;
                            linkElem.textContent = data.addLink;
                            linkElem.style.display = 'block';
                        } else {
                            linkElem.style.display = 'none';
                        }
                        // Image
                        const imgElem = document.getElementById('profileImage');
                        const defaultIcon = document.getElementById('defaultIcon');
                        if (data.photoURL && data.photoURL !== "") {
                            imgElem.src = data.photoURL;
                            imgElem.style.display = 'block';
                            defaultIcon.style.display = 'none';
                        } else {
                            imgElem.style.display = 'none';
                            defaultIcon.style.display = 'flex';
                        }

                        // Handle Fan Button
                        handleFanButton(data, userId);

                    } else {
                        console.log("⚠️ No profile data found");
                        document.getElementById('esportName').textContent = "No Profile";
                        document.getElementById('nickname').textContent = "Create one to continue";
                        document.getElementById('bioText').textContent = "";
                        document.getElementById('defaultIcon').style.display = 'flex';
                        
                        if (isOwnProfile) {
                            setTimeout(() => {
                                if(confirm("You haven't created a profile yet. Create now?")) {
                                    window.location.href = "create-profile.html";
                                }
                            }, 1000);
                        }
                    }
                })
                .catch((error) => {
                    console.error("❌ Error loading profile:", error);
                    document.getElementById('esportName').textContent = "Error";
                });
        }

        // Handle Fan Button Logic
        function handleFanButton(profileData, profileOwnerId) {
            const fanButton = document.getElementById('fanButton');
            const fanButtonText = document.getElementById('fanButtonText');
            
            // Hide button for own profile
            if (isOwnProfile || !currentUser) {
                fanButton.style.display = 'none';
                return;
            }
            
            // Show button for other profiles
            fanButton.style.display = 'flex';            
            // Check if current user is already a fan
            const fansList = profileData.fansList || {};
            isAlreadyFan = fansList[currentUser.uid] === true;
            
            console.log("🔍 Fan check:", currentUser.uid, "in fansList:", isAlreadyFan);
            
            updateFanButtonUI();
        }

        // Update Fan Button UI (Golden/Dark)
        function updateFanButtonUI() {
            const fanButton = document.getElementById('fanButton');
            const fanButtonText = document.getElementById('fanButtonText');
            const fanIcon = fanButton.querySelector('i');
            
            if (isAlreadyFan) {
                // Already a fan → Show "Unfan" (Dark button)
                fanButton.className = 'btn-action btn-unfan';
                fanButtonText.textContent = 'Unfan';
                fanIcon.className = 'fas fa-heart';
                fanIcon.style.color = '#fbbf24';
            } else {
                // Not a fan → Show "Become Fan" (Golden button)
                fanButton.className = 'btn-action btn-become-fan';
                fanButtonText.textContent = 'Become Fan';
                fanIcon.className = 'fas fa-heart';
                fanIcon.style.color = '#1a1a2e';
            }
        }

        // Toggle Fan Status (Become Fan / Unfan)
        function toggleFan() {
            if (!currentUser || !targetUserId || isOwnProfile) return;
            
            const fanButton = document.getElementById('fanButton');
            fanButton.disabled = true;
            
            const profileRef = database.ref('users/' + targetUserId + '/profile');
            const fansCountRef = database.ref('users/' + targetUserId + '/profile/followers');
            const fansListRef = database.ref('users/' + targetUserId + '/profile/fansList/' + currentUser.uid);
            
            if (isAlreadyFan) {
                // === UNFAN ===
                console.log("❌ Unfan clicked");
                
                // Update UI immediately (optimistic)
                const currentFans = parseInt(document.getElementById('fansCount').textContent.replace(/\D/g, '')) || 0;
                document.getElementById('fansCount').textContent = formatNumber(Math.max(0, currentFans - 1));
                isAlreadyFan = false;                updateFanButtonUI();
                
                // Update Firebase
                const updates = {};
                updates['followers'] = firebase.database.ServerValue.increment(-1);
                updates['fansList/' + currentUser.uid] = null;
                
                profileRef.update(updates)
                    .then(() => console.log("✅ Unfan saved to Firebase"))
                    .catch((error) => {
                        console.error("❌ Error unfanning:", error);
                        // Revert UI on error
                        document.getElementById('fansCount').textContent = formatNumber(currentFans);
                        isAlreadyFan = true;
                        updateFanButtonUI();
                        alert("Error: Could not unfan. Please try again.");
                    })
                    .finally(() => { fanButton.disabled = false; });
                    
            } else {
                // === BECOME FAN ===
                console.log("❤️ Become Fan clicked");
                
                // Update UI immediately (optimistic)
                const currentFans = parseInt(document.getElementById('fansCount').textContent.replace(/\D/g, '')) || 0;
                document.getElementById('fansCount').textContent = formatNumber(currentFans + 1);
                isAlreadyFan = true;
                updateFanButtonUI();
                
                // Update Firebase
                const updates = {};
                updates['followers'] = firebase.database.ServerValue.increment(1);
                updates['fansList/' + currentUser.uid] = true;
                
                profileRef.update(updates)
                    .then(() => console.log("✅ Fan saved to Firebase"))
                    .catch((error) => {
                        console.error("❌ Error becoming fan:", error);
                        // Revert UI on error
                        document.getElementById('fansCount').textContent = formatNumber(currentFans);
                        isAlreadyFan = false;
                        updateFanButtonUI();
                        alert("Error: Could not become fan. Please try again.");
                    })
                    .finally(() => { fanButton.disabled = false; });
            }
        }

        // Share Profile
        function shareProfile() {            const shareUrl = window.location.origin + window.location.pathname + '?uid=' + targetUserId;
            if (navigator.share) {
                navigator.share({ title: 'Check out my E-sport Profile!', url: shareUrl })
                    .catch((error) => console.log('Error sharing', error));
            } else {
                copyLink();
            }
        }

        // Copy Link
        function copyLink() {
            const shareUrl = window.location.origin + window.location.pathname + '?uid=' + targetUserId;
            navigator.clipboard.writeText(shareUrl).then(() => {
                alert("Profile link copied to clipboard!");
            }).catch((err) => {
                prompt("Copy this link:", shareUrl);
            });
        }

        // Edit Profile
        function editProfile() {
            if (isOwnProfile) {
                console.log("✏️ Editing own profile");
                window.location.href = "create-profile.html";
            } else {
                alert("You can only edit your own profile!");
            }
        }

        // Add Tournament
        function addTournament() {
            if (isOwnProfile) {
                alert("Tournament creation feature coming soon!");
            } else {
                alert("You can only create tournaments on your own profile!");
            }
        }

        // Go Back
        function goBack() { window.history.back(); }

        // Navigation
        function navigate(page) {
            if (page === 'profile.html' && !isOwnProfile) {
                window.location.href = "profile.html";
            } else {
                window.location.href = page;
            }
        }
        console.log("✅ Profile Page Loaded");
    </script>
</body>
</html>
