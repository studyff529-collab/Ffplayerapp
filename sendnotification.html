<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Notification - FF Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
            min-height: 100vh; 
            padding-bottom: 20px;
            color: #ffffff;
        }

        /* Header */
        .header { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            padding: 20px; 
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            position: relative;
        }
        
        .back-btn { 
            position: absolute; 
            left: 20px; 
            top: 50%; 
            transform: translateY(-50%);
            font-size: 24px; 
            cursor: pointer; 
            color: white;
            background: rgba(255,255,255,0.2);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-50%) scale(1.1);
        }
        
        .header-title {             font-size: 24px; 
            font-weight: 700;
            color: white;
        }

        /* Form Section */
        .form-container { 
            background: linear-gradient(135deg, #2d2d44 0%, #1a1a2e 100%); 
            margin: 20px; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .form-group { margin-bottom: 25px; }
        
        .form-label { 
            display: block; 
            margin-bottom: 10px; 
            color: #667eea; 
            font-size: 16px; 
            font-weight: 600;
        }

        .form-input, .form-textarea { 
            width: 100%; 
            padding: 15px; 
            border: 2px solid #3d3d5c; 
            border-radius: 12px; 
            font-size: 15px;
            background: #1a1a2e;
            color: #ffffff;
            transition: all 0.3s;
        }

        .form-input:focus, .form-textarea:focus { 
            outline: none; 
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102,126,234,0.3);
        }

        .form-textarea { 
            min-height: 120px; 
            resize: vertical;
        }

        .timer-info {
            color: #999;
            font-size: 13px;
            margin-top: 8px;        }

        /* Image Preview */
        .image-preview-container {
            margin-top: 15px;
            display: none;
        }
        
        .image-preview {
            width: 100%;
            max-width: 300px;
            border-radius: 12px;
            border: 2px solid #667eea;
            margin-bottom: 10px;
        }
        
        .remove-image {
            background: #f44336;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        /* Upload Button */
        .upload-btn { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            border-radius: 12px; 
            font-size: 15px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .upload-btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        /* Send Button */
        .send-notification-btn { 
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);             color: white; 
            border: none; 
            padding: 18px 40px; 
            border-radius: 25px; 
            font-size: 18px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s;
            width: 100%;
            margin-top: 20px;
            opacity: 0.5;
            pointer-events: none;
        }
        
        .send-notification-btn.active { 
            opacity: 1; 
            pointer-events: all;
        }
        
        .send-notification-btn.active:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 8px 25px rgba(76,175,80,0.5);
        }

        /* Success Overlay */
        .success-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.85); 
            display: none; 
            align-items: center; 
            justify-content: center; 
            z-index: 3000;
            backdrop-filter: blur(5px);
        }
        
        .success-overlay.show { 
            display: flex; 
        }
        
        .success-box { 
            background: linear-gradient(135deg, #2d2d44 0%, #1a1a2e 100%); 
            padding: 50px; 
            border-radius: 25px; 
            text-align: center;
            animation: slideIn 0.3s ease;
            border: 2px solid #4CAF50;        }
        
        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .success-icon { 
            width: 90px; 
            height: 90px; 
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0 auto 25px; 
            color: white; 
            font-size: 50px;
        }
        
        .success-text { 
            color: #ffffff; 
            font-size: 24px; 
            font-weight: 700;
        }

        #imageInput { display: none; }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <button class="back-btn" onclick="window.history.back()">←</button>
        <div class="header-title">Send Notification</div>
    </div>

    <!-- Form Container -->
    <div class="form-container">
        <div class="form-group">
            <label class="form-label">Notification Text *</label>
            <textarea 
                class="form-textarea" 
                id="notificationText" 
                placeholder="Enter notification message..."
                oninput="validateForm()"
            ></textarea>
        </div>

        <div class="form-group">
            <label class="form-label">Display Time (Seconds) *</label>            <input 
                type="number" 
                class="form-input" 
                id="timerSeconds" 
                placeholder="Enter seconds (1-100000000)"
                min="1"
                max="100000000"
                oninput="validateForm()"
            >
            <div class="timer-info">
                Notification will auto-delete after this time
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Add Image (Optional)</label>
            <button class="upload-btn" onclick="selectImage()">
                📎 Choose Image
            </button>
            <input type="file" id="imageInput" accept="image/*" onchange="handleImageSelect(event)">
            
            <div class="image-preview-container" id="imagePreviewContainer">
                <img src="" alt="Preview" class="image-preview" id="imagePreview">
                <br>
                <button class="remove-image" onclick="removeImage()">Remove Image</button>
            </div>
        </div>

        <button class="send-notification-btn" id="sendBtn" onclick="sendNotification()">
            📤 Send Notification
        </button>
    </div>

    <!-- Success Overlay -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-box">
            <div class="success-icon">✓</div>
            <div class="success-text">Notification Sent!</div>
        </div>
    </div>

    <script>
        let selectedImage = null;

        function selectImage() {
            document.getElementById('imageInput').click();
        }

        function handleImageSelect(event) {
            const file = event.target.files[0];            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    selectedImage = e.target.result;
                    document.getElementById('imagePreview').src = selectedImage;
                    document.getElementById('imagePreviewContainer').style.display = 'block';
                    validateForm();
                };
                reader.readAsDataURL(file);
            }
        }

        function removeImage() {
            selectedImage = null;
            document.getElementById('imageInput').value = '';
            document.getElementById('imagePreviewContainer').style.display = 'none';
            validateForm();
        }

        function validateForm() {
            const text = document.getElementById('notificationText').value.trim();
            const seconds = document.getElementById('timerSeconds').value;
            const sendBtn = document.getElementById('sendBtn');

            if (text.length > 0 && seconds >= 1 && seconds <= 100000000) {
                sendBtn.classList.add('active');
            } else {
                sendBtn.classList.remove('active');
            }
        }

        async function sendNotification() {
            const text = document.getElementById('notificationText').value.trim();
            const seconds = parseInt(document.getElementById('timerSeconds').value);
            
            if (text.length === 0 || seconds < 1 || seconds > 100000000) {
                alert('Please fill all required fields correctly');
                return;
            }

            // Compress image if exists
            let compressedImage = null;
            if (selectedImage) {
                compressedImage = await compressImage(selectedImage);
            }

            // Create notification object
            const notification = {
                id: Date.now(),
                text: text,                image: compressedImage,
                duration: seconds,
                createdAt: Date.now(),
                expiresAt: Date.now() + (seconds * 1000)
            };

            // Save to localStorage
            let notifications = JSON.parse(localStorage.getItem('notifications') || '[]');
            notifications.push(notification);
            localStorage.setItem('notifications', JSON.stringify(notifications));

            // Show success
            document.getElementById('successOverlay').classList.add('show');

            // Reset form and redirect after 2 seconds
            setTimeout(() => {
                document.getElementById('successOverlay').classList.remove('show');
                document.getElementById('notificationText').value = '';
                document.getElementById('timerSeconds').value = '';
                removeImage();
                validateForm();
                
                // Redirect to notifications page
                window.location.href = 'notificationss.html';
            }, 2000);
        }

        function compressImage(base64) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    let width = img.width;
                    let height = img.height;
                    const maxSize = 400;
                    
                    if (width > height) {
                        if (width > maxSize) {
                            height = (height * maxSize) / width;
                            width = maxSize;
                        }
                    } else {
                        if (height > maxSize) {
                            width = (width * maxSize) / height;
                            height = maxSize;
                        }
                    }                    
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
            });
        }
    </script>
</body>
</html>
