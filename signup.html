<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF Player - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; padding: 40px 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
        .logo { text-align: center; font-size: 40px; font-weight: bold; color: #4285F4; margin-bottom: 10px; }
        h2 { text-align: center; color: #333; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #666; font-size: 14px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .input-group input:focus { border-color: #667eea; outline: none; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-bottom: 15px; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; }
        .btn-google { background: #FFB900; color: #000; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-google:hover { background: #FFC107; }
        .divider { text-align: center; margin: 20px 0; color: #aaa; font-size: 14px; position: relative; }
        .divider::before, .divider::after { content: ""; position: absolute; top: 50%; width: 40%; height: 1px; background: #ddd; }
        .divider::before { left: 0; } .divider::after { right: 0; }
        .footer-link { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
        .footer-link a { color: #667eea; text-decoration: none; font-weight: 600; }
        .error { background: #ffe6e6; color: #d32f2f; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; display: none; text-align: center; }
        .loading { text-align: center; display: none; margin-bottom: 15px; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #667eea; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">G</div>
        <h2>Welcome Back</h2>
        <div class="error" id="error"></div>
        <div class="loading" id="loading"><div class="spinner"></div></div>
        <form id="loginForm">
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
        <div class="divider">OR</div>        <button class="btn btn-google" id="googleLogin">
            <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Continue with Google
        </button>
        <div class="footer-link">Don't have an account? <a href="index.html">Sign Up</a></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signInWithRedirect, GoogleAuthProvider, onAuthStateChanged, getRedirectResult } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, get, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1tXvanDZ-NsMksSgYemHbXALeckncA3M",
            authDomain: "ff-player-99533.firebaseapp.com",
            databaseURL: "https://ff-player-99533-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ff-player-99533",
            storageBucket: "ff-player-99533.firebasestorage.app",
            messagingSenderId: "204761167233",
            appId: "1:204761167233:web:bd33032ce7d56b4e7fe480"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        // Auto check: If already logged in, redirect to mainn.html
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                await saveUserData(user);
                await checkProfileAndRedirect(user);
            }
        });

        const loginForm = document.getElementById('loginForm');
        const googleBtn = document.getElementById('googleLogin');
        const errorDiv = document.getElementById('error');
        const loadingDiv = document.getElementById('loading');

        const showLoading = (show) => { loadingDiv.style.display = show ? 'block' : 'none'; };
        const showError = (msg) => { errorDiv.textContent = msg; errorDiv.style.display = 'block'; showLoading(false); };

        const saveUserData = async (user) => {
            await set(ref(db, 'users/' + user.uid), {
                uid: user.uid,
                email: user.email,
                displayName: user.displayName,
                photoURL: user.photoURL,
                lastLogin: serverTimestamp()            });
        };

        const checkProfileAndRedirect = async (user) => {
            try {
                const snapshot = await get(ref(db, 'profiles/' + user.uid));
                if (snapshot.exists()) {
                    window.location.href = 'mainn.html';
                } else {
                    window.location.href = 'home.html';
                }
            } catch (err) {
                console.error('Profile check error:', err);
                window.location.href = 'mainn.html';
            }
        };

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            showLoading(true);
            errorDiv.style.display = 'none';
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (err) { showError(err.message.replace('Firebase: ', '')); }
        });

        googleBtn.addEventListener('click', async () => {
            showLoading(true);
            errorDiv.style.display = 'none';
            try {
                await signInWithRedirect(auth, provider);
            } catch (err) { showError(err.message.replace('Firebase: ', '')); }
        });

        // Handle redirect result
        getRedirectResult(auth)
            .then(async (result) => {
                if (result) {
                    await saveUserData(result.user);
                    await checkProfileAndRedirect(result.user);
                }
            })
            .catch((err) => { showError(err.message.replace('Firebase: ', '')); });
    </script>
</body>
</html>
