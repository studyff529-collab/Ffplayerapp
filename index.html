<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF Player - Sign Up</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        .logo {
            font-size: 50px;
            font-weight: bold;
            color: #4285F4;
            margin-bottom: 10px;
        }

        h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
            position: relative;        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 38px;
            cursor: pointer;
            font-size: 18px;
            color: #888;
            user-select: none;
            transition: opacity 0.2s;
        }

        .toggle-password:hover {
            opacity: 1 !important;
        }

        .btn-signup {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;            margin-bottom: 20px;
        }

        .btn-signup:hover {
            background: #5568d3;
        }
        .btn-signup:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            color: #888;
            font-size: 14px;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #ddd;
        }

        .divider span {
            padding: 0 10px;
        }

        .btn-google {
            width: 100%;
            padding: 12px;
            background: #fbbc05;
            color: #333;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-google:hover {
            background: #e6a700;
        }
        .footer-link {
            margin-top: 25px;
            font-size: 14px;
            color: #666;
        }

        .footer-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }

        .message-box {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        .error-box {
            background: #ffe6e6;
            color: #ff4757;
            border: 1px solid #ff4757;
        }

        .success-box {
            background: #e6ffe6;
            color: #28a745;
            border: 1px solid #28a745;
        }

        .loader {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head><body>

    <div class="container">
        <div class="logo">G</div>
        <h2>Create Account</h2>
        <form id="signupForm">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your name" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
                <span class="toggle-password" id="togglePasswordBtn" style="cursor: pointer; opacity: 0.7;">👁️</span>
            </div>

            <button type="submit" class="btn-signup" id="signupBtn">Sign Up</button>
            <div class="loader" id="loader"></div>
        </form>

        <div class="message-box error-box" id="errorBox"></div>
        <div class="message-box success-box" id="successBox"></div>

        <div class="divider">
            <span>OR</span>
        </div>

        <button class="btn-google" onclick="googleSignUp()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="G" width="20">
            Sign Up with Google
        </button>

        <div class="footer-link">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyC1tXvanDZ-NsMksSgYemHbXALeckncA3M",
        authDomain: "ff-player-99533.firebaseapp.com",
        databaseURL: "https://ff-player-99533-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ff-player-99533",
        storageBucket: "ff-player-99533.firebasestorage.app",
        messagingSenderId: "204761167233",
        appId: "1:204761167233:web:bd33032ce7d56b4e7fe480"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    console.log("✅ Firebase Initialized");

    // ========================================
    // ✅ PERSISTENT LOGIN CHECK
    // Agar user already logged in hai toh direct home.html
    // ========================================
    auth.onAuthStateChanged((user) => {
        if (user) {
            console.log("✅ User already logged in:", user.uid);
            // ✅ DIRECT home.html pe bhejo (profile check kiye bina)
            window.location.href = "home.html";
        }
    });

    // Password Toggle
    function togglePassword(inputId, iconElement) {
        const passwordInput = document.getElementById(inputId);
        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            iconElement.textContent = "🙈";
            iconElement.style.opacity = "1";
        } else {
            passwordInput.type = "password";
            iconElement.textContent = "👁️";
            iconElement.style.opacity = "0.7";
        }
    }

    // Form Submit
    document.getElementById('signupForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const errorBox = document.getElementById('errorBox');        const successBox = document.getElementById('successBox');
        const signupBtn = document.getElementById('signupBtn');
        const loader = document.getElementById('loader');

        errorBox.style.display = 'none';
        successBox.style.display = 'none';

        const fullName = document.getElementById('fullName').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        console.log("📝 Sign Up:", email);

        signupBtn.disabled = true;
        signupBtn.textContent = "Creating Account...";
        loader.style.display = 'block';

        auth.createUserWithEmailAndPassword(email, password)
            .then((userCredential) => {
                const user = userCredential.user;
                const userId = user.uid;

                console.log("✅ Auth User Created:", userId);

                return database.ref('users/' + userId).set({
                    name: fullName,
                    email: email,
                    createdAt: new Date().toISOString()
                });
            })
            .then(() => {
                console.log("✅ Data saved to Database");

                successBox.textContent = "Account Created Successfully! Redirecting...";
                successBox.style.display = 'block';

                localStorage.setItem("userId", auth.currentUser.uid);
                localStorage.setItem("userName", fullName);

                // ✅ DIRECT home.html pe redirect (create-profile skip karke)
                setTimeout(() => {
                    window.location.href = "home.html";
                }, 2000);
            })
            .catch((error) => {
                console.error("❌ Error:", error.message);
                errorBox.textContent = "Error: " + error.message;
                errorBox.style.display = 'block';

                signupBtn.disabled = false;                signupBtn.textContent = "Sign Up";
                loader.style.display = 'none';
            });
    });

    function googleSignUp() {
        alert("Google Sign Up feature jald hi aayega!");
    }
</script>
</body>
</html>
