<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - FF Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #ffffff; padding-bottom: 20px; }
        
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 30px 20px; text-align: center; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .user-circle { width: 80px; height: 80px; background: #ffffff; color: #667eea; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: bold; margin: 0 auto 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); overflow: hidden; }
        .user-circle img { width: 100%; height: 100%; object-fit: cover; }
        .edit-icon { position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .edit-icon:hover { background: rgba(255,255,255,0.3); transform: scale(1.1); }
        .user-name { font-size: 22px; font-weight: 600; margin-bottom: 5px; }
        .user-email { font-size: 14px; opacity: 0.9; }
        
        .menu-container { padding: 20px; }
        .menu-item { background: linear-gradient(135deg, #2d2d44 0%, #1a1a2e 100%); border-radius: 15px; padding: 18px 20px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 5px 15px rgba(0,0,0,0.2); border: 2px solid transparent; }
        .menu-item:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(102,126,234,0.3); border-color: #667eea; }
        .menu-icon { width: 45px; height: 45px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .menu-text { flex: 1; font-size: 16px; font-weight: 500; }
        .menu-arrow { color: #667eea; font-size: 20px; }
        
        .logout-btn { background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%); color: white; border: none; border-radius: 15px; padding: 18px 20px; width: 100%; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 15px; box-shadow: 0 5px 15px rgba(244,67,54,0.3); }
        .logout-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(244,67,54,0.4); }
        .logout-icon { width: 45px; height: 45px; background: rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        
        .loading { display: flex; justify-content: center; align-items: center; min-height: 100vh; font-size: 18px; color: #667eea; }
    </style>
</head>
<body>
    <div id="appContent" style="display: none;">
        <div class="header">
            <div class="user-circle" id="userCircle">
                <span id="userInitial">?</span>
                <img id="userImage" src="" style="display: none;">
            </div>
            <div class="user-name" id="userName">Loading...</div>
            <div class="user-email" id="userEmail">Loading...</div>
            <div class="edit-icon" id="editProfile" title="Edit Profile">✏️</div>
        </div>

        <div class="menu-container">
            <div class="menu-item" id="chartBtn">
                <div class="menu-icon">📞</div>
                <div class="menu-text">Chart Help Centre</div>
                <div class="menu-arrow">›</div>
            </div>            <div class="menu-item" id="shareBtn">
                <div class="menu-icon">📤</div>
                <div class="menu-text">Share App</div>
                <div class="menu-arrow">›</div>
            </div>
            <div class="menu-item" id="settingBtn">
                <div class="menu-icon">⚙️</div>
                <div class="menu-text">Setting</div>
                <div class="menu-arrow">›</div>
            </div>
            <div class="menu-item" id="privacyBtn">
                <div class="menu-icon">🔒</div>
                <div class="menu-text">Privacy & Policy</div>
                <div class="menu-arrow">›</div>
            </div>
            <button class="logout-btn" id="logoutBtn">
                <div class="logout-icon">🚪</div>
                <div>Logout</div>
            </button>
        </div>
    </div>
    <div class="loading" id="loading">Loading...</div>

    <!-- Firebase SDKs (Compat Version - Same as other files) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyC1tXvanDZ-NsMksSgYemHbXALeckncA3M",
            authDomain: "ff-player-99533.firebaseapp.com",
            databaseURL: "https://ff-player-99533-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ff-player-99533",
            storageBucket: "ff-player-99533.firebasestorage.app",
            messagingSenderId: "204761167233",
            appId: "1:204761167233:web:bd33032ce7d56b4e7fe480"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // Auth State Check
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'index.html'; // ✅ Fixed: signup.html → index.html
                return;
            }
            try {
                // ✅ Fixed: Correct database path
                const snapshot = await database.ref('users/' + user.uid + '/profile').once('value');
                
                const userCircle = document.getElementById('userCircle');
                const userInitial = document.getElementById('userInitial');
                const userImage = document.getElementById('userImage');
                
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    document.getElementById('userName').textContent = data.eSportName || data.name || 'User';
                    document.getElementById('userEmail').textContent = user.email;
                    
                    // Load Profile Photo
                    if (data.photoURL && data.photoURL !== "") {
                        userImage.src = data.photoURL;
                        userImage.style.display = 'block';
                        userInitial.style.display = 'none';
                    } else {
                        const firstLetter = data.eSportName ? data.eSportName.charAt(0).toUpperCase() : user.email.charAt(0).toUpperCase();
                        userInitial.textContent = firstLetter;
                    }
                } else {
                    document.getElementById('userName').textContent = 'User';
                    document.getElementById('userEmail').textContent = user.email;
                    userInitial.textContent = user.email.charAt(0).toUpperCase();
                }
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
                
            } catch (err) {
                console.error('Error:', err);
                window.location.href = 'index.html';
            }
        });

        // Edit Profile - Fixed
        document.getElementById('editProfile').addEventListener('click', () => {
            window.location.href = 'create-profile.html'; // ✅ Simple redirect
        });

        // Chart Help Centre
        document.getElementById('chartBtn').addEventListener('click', () => {
            alert('Chart Help Centre - Feature coming soon!');
        });

        // Share App
        document.getElementById('shareBtn').addEventListener('click', async () => {            const shareUrl = window.location.href;
            if (navigator.share) {
                try {
                    await navigator.share({ title: 'FF Player App', url: shareUrl });
                } catch (err) { if (err.name !== 'AbortError') console.error(err); }
            } else {
                navigator.clipboard.writeText(shareUrl);
                alert('Link copied to clipboard!');
            }
        });

        // Settings
        document.getElementById('settingBtn').addEventListener('click', () => {
            alert('Settings - Feature coming soon!');
        });

// Privacy & Policy
document.getElementById('privacyBtn').addEventListener('click', () => {
    window.location.href = 'privating.html';
});

        // Logout - Fixed redirect
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            if (confirm('Are you sure you want to logout?')) {
                try {
                    await auth.signOut();
                    window.location.href = 'index.html'; // ✅ Fixed
                } catch (err) {
                    alert('Error logging out. Please try again.');
                }
            }
        });
    </script>
</body>
</html>
