<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF Player - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        .logo {
            font-size: 50px;
            font-weight: bold;
            color: #4285F4;
            margin-bottom: 10px;
        }

        h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
            position: relative;        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 38px;
            cursor: pointer;
            font-size: 18px;
            color: #888;
            user-select: none;
            transition: opacity 0.2s;
        }

        .toggle-password:hover {
            opacity: 1 !important;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;            margin-bottom: 20px;
        }

        .btn-login:hover {
            background: #5568d3;
        }
        .btn-login:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            color: #888;
            font-size: 14px;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #ddd;
        }

        .divider span {
            padding: 0 10px;
        }

        .btn-google {
            width: 100%;
            padding: 12px;
            background: #fbbc05;
            color: #333;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-google:hover {
            background: #e6a700;
        }
        .footer-link {
            margin-top: 25px;
            font-size: 14px;
            color: #666;
        }

        .footer-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }

        .message-box {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        .error-box {
            background: #ffe6e6;
            color: #ff4757;
            border: 1px solid #ff4757;
        }

        .success-box {
            background: #e6ffe6;
            color: #28a745;
            border: 1px solid #28a745;
        }

        .loader {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head><body>

    <div class="container">
        <div class="logo">G</div>
        <h2>Welcome Back</h2>
        <form id="loginForm">
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
                <span class="toggle-password" onclick="togglePassword('password', this)" style="cursor: pointer; opacity: 0.7;">👁️</span>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">Login</button>
            <div class="loader" id="loader"></div>
        </form>

        <div class="message-box error-box" id="errorBox"></div>
        <div class="message-box success-box" id="successBox"></div>

        <div class="divider">
            <span>OR</span>
        </div>

        <button class="btn-google" onclick="googleLogin()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="G" width="20">
            Continue with Google
        </button>

        <div class="footer-link">
            Don't have an account? <a href="index.html">Sign Up</a>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyC1tXvanDZ-NsMksSgYemHbXALeckncA3M",
        authDomain: "ff-player-99533.firebaseapp.com",
        databaseURL: "https://ff-player-99533-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ff-player-99533",
        storageBucket: "ff-player-99533.firebasestorage.app",
        messagingSenderId: "204761167233",
        appId: "1:204761167233:web:bd33032ce7d56b4e7fe480"
    };
    
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();
    
    console.log("✅ Firebase Initialized");
    
    // ========================================
    // ✅ PERSISTENT LOGIN CHECK
    // Agar user already logged in hai toh direct home.html
    // ========================================
    auth.onAuthStateChanged((user) => {
        if (user) {
            console.log("✅ User already logged in:", user.uid);
            // ✅ DIRECT home.html pe bhejo (profile check kiye bina)
            window.location.href = "home.html";
        }
    });
    
    // Password Toggle
    function togglePassword(inputId, iconElement) {
        const passwordInput = document.getElementById(inputId);
        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            iconElement.textContent = "🙈";
            iconElement.style.opacity = "1";
        } else {
            passwordInput.type = "password";
            iconElement.textContent = "👁️";
            iconElement.style.opacity = "0.7";
        }
    }
    
    // Form Submit
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const errorBox = document.getElementById('errorBox');
        const successBox = document.getElementById('successBox');
        const loginBtn = document.getElementById('loginBtn');
        const loader = document.getElementById('loader');
        
        errorBox.style.display = 'none';
        successBox.style.display = 'none';
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        console.log("📝 Login:", email);
        
        loginBtn.disabled = true;
        loginBtn.textContent = "Logging in...";
        loader.style.display = 'block';
        
        auth.signInWithEmailAndPassword(email, password)
            .then((userCredential) => {
                const user = userCredential.user;
                console.log("✅ Login Successful:", user.uid);
                
                localStorage.setItem("userId", user.uid);
                localStorage.setItem("userName", user.email);
                
                successBox.textContent = "Login Successful! Redirecting...";
                successBox.style.display = 'block';
                
                // ✅ DIRECT home.html pe redirect (profile check kiye bina)
                setTimeout(() => {
                    window.location.href = "home.html";
                }, 1500);
            })
            .catch((error) => {
                console.error("❌ Error:", error.message);
                errorBox.textContent = "Error: " + error.message;
                errorBox.style.display = 'block';
                
                loginBtn.disabled = false;
                loginBtn.textContent = "Login";
                loader.style.display = 'none';
            });
    });
    
    function googleLogin() {
        alert("Google Login feature jald hi aayega!");
    }
</script>
</body>
</html>
