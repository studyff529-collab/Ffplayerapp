<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create E-sport - FF Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(180deg, #667eea 0%, #1a1a2e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            padding: 15px 10px;
            color: white;
        }

        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            margin-right: 15px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .container {
            background: rgba(30, 30, 50, 0.9);
            border-radius: 20px;
            padding: 30px 20px;
            margin-top: 20px;
            text-align: center;        }

        .photo-upload-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 25px;
        }

        .photo-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid #667eea;
            background: #2a2a4a;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .photo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .photo-circle .default-icon {
            font-size: 60px;
            color: #667eea;
        }

        .photo-circle .placeholder-text {
            position: absolute;
            bottom: -30px;
            font-size: 14px;
            color: #aaa;
            width: 100%;
        }

        .edit-icon {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 35px;
            height: 35px;
            background: #667eea;            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 2px solid #2a2a4a;
        }

        .edit-icon span {
            font-size: 18px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: #667eea;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .input-group label span {
            color: #ff6b6b;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 14px 15px;
            background: #2a2a4a;
            border: 1px solid #3a3a5a;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .input-group textarea {
            resize: none;            height: 80px;
        }

        .input-group input::placeholder,
        .input-group textarea::placeholder {
            color: #666;
        }

        .btn-create {
            width: 100%;
            padding: 16px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-create:hover {
            background: #218838;
        }

        .btn-create:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .loader {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #28a745;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 1s linear infinite;
            margin: 15px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #fileInput {
            display: none;
        }
        .message-box {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        .error-box {
            background: #ffe6e6;
            color: #ff4757;
            border: 1px solid #ff4757;
        }

        .success-box {
            background: #e6ffe6;
            color: #28a745;
            border: 1px solid #28a745;
        }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="goBack()">←</button>
        <h1>Create E-sport Channel</h1>
    </div>

    <div class="container">
        
        <div class="photo-upload-container">
            <div class="photo-circle" onclick="document.getElementById('fileInput').click()">
                <span class="default-icon">🎮</span>
                <img id="previewImage" alt="Profile Photo">
                <div class="placeholder-text">Tap to upload logo</div>
            </div>
            <div class="edit-icon" onclick="document.getElementById('fileInput').click()">
                <span>✏️</span>
            </div>
        </div>

        <input type="file" id="fileInput" accept="image/*" onchange="previewFile()">

        <form id="profileForm">
            <div class="input-group">
                <label>E-sport Name <span>*</span></label>
                <input type="text" id="eSportName" placeholder="Enter E-sport name" required>
            </div>
            <div class="input-group">
                <label>Nick Name <span>*</span></label>
                <input type="text" id="nickname" placeholder="Enter nickname" required>
            </div>

            <div class="input-group">
                <label>Bio</label>
                <textarea id="bio" placeholder="Tell about your team"></textarea>
            </div>

            <div class="input-group">
                <label>Add Link</label>
                <input type="url" id="addLink" placeholder="https://...">
            </div>

            <button type="submit" class="btn-create" id="createBtn">Create E-sport</button>
            <div class="loader" id="loader"></div>
        </form>

        <div class="message-box error-box" id="errorBox"></div>
        <div class="message-box success-box" id="successBox"></div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyC1tXvanDZ-NsMksSgYemHbXALeckncA3M",
            authDomain: "ff-player-99533.firebaseapp.com",
            databaseURL: "https://ff-player-99533-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ff-player-99533",
            storageBucket: "ff-player-99533.firebasestorage.app",
            messagingSenderId: "204761167233",
            appId: "1:204761167233:web:bd33032ce7d56b4e7fe480"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        console.log("✅ Firebase Initialized for Profile Creation");

        // Check if user is logged in
        let currentUser = null;
                auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                console.log("✅ User logged in:", user.uid);
            } else {
                console.log("❌ No user logged in");
                alert("Please login first!");
                window.location.href = "login.html";
            }
        });

        // ImgBB API Key
        const IMGBB_API_KEY = "f348923e19553abb6abc54ba686a6209";

        let imageUrl = "";

        // Preview File Function
        function previewFile() {
            const fileInput = document.getElementById('fileInput');
            const previewImage = document.getElementById('previewImage');
            const defaultIcon = document.querySelector('.default-icon');

            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    previewImage.src = e.target.result;
                    previewImage.style.display = 'block';
                    defaultIcon.style.display = 'none';
                }
                
                reader.readAsDataURL(fileInput.files[0]);
            }
        }

        // Go Back Function
        function goBack() {
            window.history.back();
        }

        // Form Submit Handle
        document.getElementById('profileForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const errorBox = document.getElementById('errorBox');
            const successBox = document.getElementById('successBox');
            const createBtn = document.getElementById('createBtn');
            const loader = document.getElementById('loader');

            errorBox.style.display = 'none';            successBox.style.display = 'none';

            // Check if user is logged in
            if (!currentUser) {
                errorBox.textContent = "Please login first!";
                errorBox.style.display = 'block';
                return;
            }

            const userId = currentUser.uid;
            console.log("🆔 Creating profile for user:", userId);

            const eSportName = document.getElementById('eSportName').value;
            const nickname = document.getElementById('nickname').value;
            const bio = document.getElementById('bio').value;
            const addLink = document.getElementById('addLink').value;
            const fileInput = document.getElementById('fileInput');

            createBtn.disabled = true;
            createBtn.textContent = "Creating Profile...";
            loader.style.display = 'block';

            try {
                // Upload Image to ImgBB (if selected)
                if (fileInput.files && fileInput.files[0]) {
                    const formData = new FormData();
                    formData.append('image', fileInput.files[0]);

                    const imgbbResponse = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                        method: 'POST',
                        body: formData
                    });

                    const imgbbData = await imgbbResponse.json();

                    if (imgbbData.success) {
                        imageUrl = imgbbData.data.url;
                        console.log("✅ Image uploaded to ImgBB:", imageUrl);
                    } else {
                        throw new Error("Image upload failed");
                    }
                } else {
                    // No image selected, use default
                    imageUrl = "";
                }

                // Prepare Profile Data
                const profileData = {
                    photoURL: imageUrl,
                    eSportName: eSportName,                    nickname: nickname,
                    bio: bio,
                    addLink: addLink,
                    createdAt: new Date().toISOString(),
                    followers: 0,
                    posts: 0
                };

                console.log("💾 Saving profile to Firebase...", profileData);

                // Save to Firebase Realtime Database
                await database.ref('users/' + userId + '/profile').set(profileData);

                console.log("✅ Profile saved successfully!");

                // Update LocalStorage
                localStorage.setItem("userName", eSportName);

                successBox.textContent = "E-sport Profile Created Successfully!";
                successBox.style.display = 'block';

                setTimeout(() => {
                    window.location.href = "home.html";
                }, 2000);

            } catch (error) {
                console.error("❌ Error:", error.message);
                errorBox.textContent = "Error: " + error.message;
                errorBox.style.display = 'block';
                
                createBtn.disabled = false;
                createBtn.textContent = "Create E-sport";
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
